<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | College Club Events</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}" />
</head>
<body class="login-body">

<div class="login-wrapper">
  <div class="login-card">
    <!-- Icon -->
    <div class="login-icon-wrap">
      <i class="bi bi-calendar-event-fill login-icon"></i>
    </div>

    <h2 class="login-title">Club Events Admin</h2>
    <p class="login-subtitle">Sign in to manage your college clubs &amp; events</p>

    {% if error %}
    <div class="alert alert-danger d-flex align-items-center" role="alert">
      <i class="bi bi-exclamation-triangle-fill me-2"></i>
      <div>{{ error }}</div>
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}" novalidate>
      <div class="mb-3">
        <label for="email" class="form-label fw-semibold">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
          <input type="email" class="form-control" id="email" name="email"
                 placeholder="admin@clubevents.com" required autofocus />
        </div>
      </div>

      <div class="mb-4">
        <label for="password" class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" class="form-control" id="password" name="password"
                 placeholder="Enter your password" required />
          <button class="btn btn-outline-secondary" type="button" id="togglePw"
                  onclick="togglePassword()">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-login w-100" id="loginBtn">
        <span class="btn-text"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In</span>
        <span class="spinner-border spinner-border-sm d-none" id="loginSpinner"></span>
      </button>
    </form>

    <p class="login-hint mt-3">
      <i class="bi bi-shield-lock me-1"></i>
      Default: admin@clubevents.com / admin123
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function togglePassword() {
    const pw = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (pw.type === 'password') {
      pw.type = 'text';
      icon.className = 'bi bi-eye-slash';
    } else {
      pw.type = 'password';
      icon.className = 'bi bi-eye';
    }
  }

  document.querySelector('form').addEventListener('submit', function () {
    document.getElementById('loginBtn').disabled = true;
    document.querySelector('.btn-text').classList.add('d-none');
    document.getElementById('loginSpinner').classList.remove('d-none');
  });
</script>
</body>
</html>

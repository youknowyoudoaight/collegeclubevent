{% extends "base.html" %}
{% block title %}{{ 'Edit' if event else 'Add' }} Event{% endblock %}
{% block page_title %}{{ 'Edit' if event else 'Add' }} Event{% endblock %}

{% block content %}
<div class="container-fluid px-4 pb-4">
  <div class="d-flex align-items-center gap-2 mb-3">
    <a href="{{ url_for('events') }}" class="btn btn-sm btn-outline-secondary">
      <i class="bi bi-arrow-left"></i>
    </a>
    <h5 class="mb-0">
      <i class="bi bi-calendar-event-fill me-2 text-purple"></i>
      {{ 'Edit Event' if event else 'Add New Event' }}
    </h5>
  </div>

  <div class="row justify-content-center">
    <div class="col-12 col-lg-8">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <form method="POST" id="eventForm">
            <div class="row g-3">
              <div class="col-12">
                <label class="form-label fw-semibold">Event Name <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="event_name" required
                       value="{{ event.event_name if event else '' }}" placeholder="e.g. Annual Hackathon 2026" />
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Club <span class="text-danger">*</span></label>
                <select class="form-select" name="club_id" required>
                  <option value="">-- Select Club --</option>
                  {% for club in clubs %}
                  <option value="{{ club.id }}" {% if event and event.club_id == club.id %}selected{% endif %}>
                    {{ club.club_name }}
                  </option>
                  {% endfor %}
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Event Date <span class="text-danger">*</span></label>
                <input type="date" class="form-control" name="event_date" required
                       value="{{ event.event_date.strftime('%Y-%m-%d') if event and event.event_date else '' }}" />
              </div>
              <div class="col-md-8">
                <label class="form-label fw-semibold">Venue</label>
                <input type="text" class="form-control" name="venue"
                       value="{{ event.venue if event else '' }}" placeholder="e.g. Main Auditorium" />
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold">Max Participants</label>
                <input type="number" class="form-control" name="max_participants" min="1"
                       value="{{ event.max_participants if event else 100 }}" />
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold">Description</label>
                <textarea class="form-control" name="description" rows="3"
                          placeholder="Event description...">{{ event.description if event else '' }}</textarea>
              </div>
            </div>
            <div class="d-flex gap-2 mt-4">
              <button type="submit" class="btn btn-purple" id="submitBtn">
                <span class="btn-text">
                  <i class="bi bi-{{ 'check-lg' if event else 'plus-lg' }} me-1"></i>
                  {{ 'Update Event' if event else 'Add Event' }}
                </span>
                <span class="spinner-border spinner-border-sm d-none" id="submitSpinner"></span>
              </button>
              <a href="{{ url_for('events') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
